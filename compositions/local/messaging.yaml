apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: application-messaging-local
  labels:
    platform.digiorg.io/target: local
    platform.digiorg.io/component: messaging
spec:
  compositeTypeRef:
    apiVersion: platform.digiorg.io/v1alpha1
    kind: Application
  resources:

    # NATS Configuration ConfigMap
    # Phase 1: Creates a ConfigMap with NATS connection details and primary subject.
    # App containers can mount this as env vars or a volume.
    # TODO: Phase 2 — add JetStream Stream/Consumer CRD management via NATS Controller
    #                  or provider-http against NATS Management API.
    # TODO: Phase 2 — Multi-subject support via Composition Functions (KCL):
    #                  join spec.messaging.subjects[] into comma-separated NATS_SUBJECTS string.
    - name: nats-config
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          forProvider:
            manifest:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: placeholder
                namespace: placeholder
                labels:
                  app.kubernetes.io/managed-by: crossplane
                  platform.digiorg.io/component: messaging
                  platform.digiorg.io/app: placeholder
              data:
                # NATS cluster URL — internal cluster DNS
                NATS_URL: "nats://nats.nats.svc.cluster.local:4222"
                # Primary NATS subject (index 0 from spec.messaging.subjects)
                # Multi-subject support via KCL Composition Functions follows in Phase 2
                NATS_SUBJECT: "placeholder"
          providerConfigRef:
            name: default
      patches:
        # Namespace = appName (created by Base Composition C-4)
        - type: FromCompositeFieldPath
          fromFieldPath: spec.appName
          toFieldPath: spec.forProvider.manifest.metadata.namespace
        # ConfigMap name = <appName>-nats-config
        - type: FromCompositeFieldPath
          fromFieldPath: spec.appName
          toFieldPath: spec.forProvider.manifest.metadata.name
          transforms:
            - type: string
              string:
                fmt: "%s-nats-config"
        # Label: platform.digiorg.io/app = appName
        - type: FromCompositeFieldPath
          fromFieldPath: spec.appName
          toFieldPath: spec.forProvider.manifest.metadata.labels[platform.digiorg.io/app]
        # NATS_SUBJECT = first subject from spec.messaging.subjects[0]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.messaging.subjects[0]
          toFieldPath: spec.forProvider.manifest.data.NATS_SUBJECT
